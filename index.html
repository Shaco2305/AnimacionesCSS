<html>
<head>
    <title>ANIMACIONES CSS - ANIMATION</title>
    <style>
    h1{
        font-family: "century gothic";
        color: rgb(165, 42, 42,0);
        text-align: center;

        animation-name: titulo; /*titulo para la animacion*/
        animation-duration: 3s; /*duracion de la animacion que facil*/
        animation-iteration-count: 1; /*cant. de veces q se realiza la animacion*/
        animation-fill-mode: forwards; /*Indica cual es el ultimo estado que se queda*/
    }

    @keyframes titulo{
        from{
            color: rgba(165, 42, 42, 0);
        }
        to{
            color: rgb(165, 42, 42, 1)
        }
    }
    p{
        color: rgba(0,0,0,1);
        text-align: center;
        font-family: "century gothic";
        font-weight: bold;
        animation-name: texto;
        opacity: 0;
        animation-duration: 3s;
        animation-iteration-count: 1;
        animation-fill-mode: forwards;
        animation-delay: 3s;
    }

    @keyframes texto{
        from{
            opacity: 0;
            

        }
        to{
            opacity: 1;
        }
    }

    img{
        height: 200px;
        width: 200px;
        display: block;/*centrar la imagen*/
        margin: auto; /*centrar imagen*/
        opacity: 0;

        animation: imagen 3s 6s 1 forwards;
    }

    @keyframes imagen {
        from{
            opacity: 0;
        }
        to{
            opacity: 1  ;
        }
    }
    </style>

</head>
<body>
    <h1>PROMOCION 2026 - CI</h1>
    <P>IESTP MANUEL SEOANE CORRALES</P>
    <img src="img/logo.png">
</body>
</html>
